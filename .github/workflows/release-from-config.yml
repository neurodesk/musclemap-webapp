name: Auto Release And Version Bump

on:
  push:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  release:
    if: github.actor != 'github-actions[bot]'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute next version from commit messages
        id: next_version
        run: |
          CURRENT="$(bash scripts/get_version.sh)"
          IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
          if [[ -z "${MAJOR}" || -z "${MINOR}" || -z "${PATCH}" ]]; then
            echo "VERSION must be semantic version x.y.z; got '${CURRENT}'"
            exit 1
          fi

          RANGE_START="${{ github.event.before }}"
          RANGE_END="${{ github.sha }}"
          if [[ "${{ github.event_name }}" == "push" && "$RANGE_START" != "0000000000000000000000000000000000000000" ]]; then
            SUBJECTS="$(git log --format=%s "${RANGE_START}..${RANGE_END}")"
            FULL_MESSAGES="$(git log --format=%B "${RANGE_START}..${RANGE_END}")"
          else
            SUBJECTS="$(git log -1 --format=%s "${RANGE_END}")"
            FULL_MESSAGES="$(git log -1 --format=%B "${RANGE_END}")"
          fi

          BUMP="patch"
          if printf '%s\n' "$FULL_MESSAGES" | grep -Eiq 'BREAKING CHANGE|#major|\[major\]'; then
            BUMP="major"
          elif printf '%s\n' "$SUBJECTS" | grep -Eiq '^feat(\([^)]+\))?:|#minor|\[minor\]'; then
            BUMP="minor"
          fi
          if printf '%s\n' "$SUBJECTS" | grep -Eiq '^[a-z]+(\([^)]+\))?!:'; then
            BUMP="major"
          fi

          if [[ "$BUMP" == "major" ]]; then
            NEXT="$((MAJOR + 1)).0.0"
          elif [[ "$BUMP" == "minor" ]]; then
            NEXT="${MAJOR}.$((MINOR + 1)).0"
          else
            NEXT="${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          TAG="v${NEXT}"
          echo "current=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "bump=${BUMP}" >> "$GITHUB_OUTPUT"
          echo "version=${NEXT}" >> "$GITHUB_OUTPUT"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${CURRENT}"
          echo "Bump type: ${BUMP}"
          echo "Next version: ${NEXT}"

      - name: Check if tag already exists
        id: tag_check
        run: |
          TAG="${{ steps.next_version.outputs.tag }}"
          if git ls-remote --tags origin "refs/tags/${TAG}" | grep -q "${TAG}"; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "Tag ${TAG} already exists on origin."
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Bump config version, commit, tag, and push
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          NEXT="${{ steps.next_version.outputs.version }}"
          TAG="${{ steps.next_version.outputs.tag }}"

          sed -i -E "s/^export const VERSION = '[^']+';$/export const VERSION = '${NEXT}';/" web/js/app/config.js

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add web/js/app/config.js
          git commit -m "chore(release): bump version to ${TAG}"
          git tag "${TAG}"
          git push origin HEAD:main --follow-tags

      - name: Create or update GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="${{ steps.next_version.outputs.tag }}"
          if gh release view "$TAG" --json tagName >/dev/null 2>&1; then
            echo "Release ${TAG} already exists; updating metadata."
            gh release edit "$TAG" --title "$TAG" --latest
          else
            echo "Creating release ${TAG}."
            gh release create "$TAG" --generate-notes --title "$TAG" --latest
          fi
